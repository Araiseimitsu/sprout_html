<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サンプルページ</title>
  <style>
    body { font-family: sans-serif; margin: 40px; color: #222; }
    h1 { color: #2c7; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>ようこそ Sprout HTML へ</h1>
  <p>これは編集テスト用のサンプルページです。</p>
  <div class="card">
    <h2>カード</h2>
    <p>このテキストをクリックして編集してみましょう。</p>
    <a href="https://example.com">リンク例</a>
  </div>
  <ul>
    <li>項目1</li>
    <li>項目2</li>
    <li>項目3</li>
  </ul>
  <script>
    console.log("このスクリプトは編集中は実行されません");
  </script>
</body>
</html>
